name: maintops-stack

x-laravel-environment: &laravel-environment
  APP_NAME: ${APP_NAME:-MaintOps}
  APP_ENV: ${APP_ENV:-local}
  APP_DEBUG: "${APP_DEBUG:-true}"
  APP_KEY: ${APP_KEY:-base64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  APP_URL: ${APP_URL:-http://localhost:8000}
  API_VERSION: ${API_VERSION:-1.0.0}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_STACK: ${LOG_STACK:-single}
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: ${MYSQL_DATABASE:-maintops}
  DB_USERNAME: ${MYSQL_USER:-maintops}
  DB_PASSWORD: ${MYSQL_PASSWORD:-maintops-local-password}
  SESSION_DRIVER: database
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "false"
  SESSION_PATH: /
  BROADCAST_CONNECTION: log
  FILESYSTEM_DISK: local
  QUEUE_CONNECTION: database
  CACHE_STORE: database
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  OPERATIONS_EVENT_REDIS_HOST: redis
  OPERATIONS_EVENT_REDIS_PORT: "6379"
  OPERATIONS_EVENT_REDIS_DB: "0"
  OPERATIONS_EVENT_STREAM: ${MAINTOPS_EVENTS_STREAM:-maintops:events}
  SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:-maintops-local-development-service-token-secret}
  SERVICE_TOKEN_TTL_SECONDS: "300"
  SERVICE_TOKEN_ISSUER: ${APP_URL:-http://localhost:8000}
  OPERATIONS_ANALYTICS_SERVICE_KEY: ${OPERATIONS_ANALYTICS_SERVICE_KEY:-maintops-local-development-analytics-service-key}
  MAIL_MAILER: smtp
  MAIL_HOST: mailpit
  MAIL_PORT: "1025"
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-MaintOps}
  SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:5173,127.0.0.1,127.0.0.1:5173}

x-analytics-environment: &analytics-environment
  APP_ENV: ${APP_ENV:-local}
  POSTGRES_HOST: analytics-db
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${ANALYTICS_POSTGRES_DB:-maintops_analytics}
  POSTGRES_USER: ${ANALYTICS_POSTGRES_USER:-maintops_analytics}
  POSTGRES_PASSWORD: ${ANALYTICS_POSTGRES_PASSWORD:-maintops-analytics-password}
  SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:-maintops-local-development-service-token-secret}
  LARAVEL_INTERNAL_URL: http://laravel:8000
  LARAVEL_ANALYTICS_SERVICE_KEY: ${OPERATIONS_ANALYTICS_SERVICE_KEY:-maintops-local-development-analytics-service-key}
  INITIAL_SYNC_PAGE_SIZE: ${ANALYTICS_INITIAL_SYNC_PAGE_SIZE:-100}
  INITIAL_SYNC_TIMEOUT_SECONDS: ${ANALYTICS_INITIAL_SYNC_TIMEOUT_SECONDS:-15}
  REDIS_URL: redis://redis:6379/0
  REDIS_STREAM: ${MAINTOPS_EVENTS_STREAM:-maintops:events}
  REDIS_CONSUMER_GROUP: ${ANALYTICS_REDIS_CONSUMER_GROUP:-maintops-analytics-fastapi}
  REDIS_CONSUMER_NAME: ${ANALYTICS_REDIS_CONSUMER_NAME:-analytics-worker}
  REDIS_BATCH_SIZE: ${ANALYTICS_REDIS_BATCH_SIZE:-50}
  REDIS_BLOCK_MS: ${ANALYTICS_REDIS_BLOCK_MS:-5000}
  REDIS_PENDING_IDLE_MS: ${ANALYTICS_REDIS_PENDING_IDLE_MS:-60000}
  ANALYTICS_DEFAULT_PERIOD_DAYS: ${ANALYTICS_DEFAULT_PERIOD_DAYS:-30}
  ANALYTICS_MINIMUM_SAMPLE_SIZE: ${ANALYTICS_MINIMUM_SAMPLE_SIZE:-3}
  FORECAST_DEFAULT_HORIZON_DAYS: ${FORECAST_DEFAULT_HORIZON_DAYS:-14}
  FORECAST_HISTORY_DAYS: ${FORECAST_HISTORY_DAYS:-28}
  FORECAST_MINIMUM_HISTORY_ACTIVITIES: ${FORECAST_MINIMUM_HISTORY_ACTIVITIES:-5}

x-laravel-build: &laravel-build
  context: ./maintops-api-laravel

x-frontend-build: &frontend-build
  context: ./maintops-web-vue

x-realtime-build: &realtime-build
  context: ./maintops-realtime-node
  target: development

x-analytics-build: &analytics-build
  context: ./maintops-analytics-fastapi

services:
  mysql:
    image: mysql:8.4
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-maintops}
      MYSQL_USER: ${MYSQL_USER:-maintops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-maintops-local-password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-maintops-local-root-password}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8025}:8025"

  laravel-init:
    image: maintops-stack-laravel
    build: *laravel-build
    command: sh docker/init-development.sh
    environment: *laravel-environment
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: "no"

  laravel:
    image: maintops-stack-laravel
    build: *laravel-build
    environment: *laravel-environment
    ports:
      - "${LARAVEL_PORT:-8000}:8000"
    depends_on:
      laravel-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit((int) ! @fsockopen(\"127.0.0.1\", 8000));'"]
      interval: 5s
      timeout: 5s
      retries: 20

  queue:
    image: maintops-stack-laravel
    build: *laravel-build
    command: php artisan queue:work --sleep=1 --tries=5 --timeout=90
    environment: *laravel-environment
    depends_on:
      laravel-init:
        condition: service_completed_successfully
    restart: unless-stopped

  scheduler:
    image: maintops-stack-laravel
    build: *laravel-build
    command: php artisan schedule:work
    environment: *laravel-environment
    depends_on:
      laravel-init:
        condition: service_completed_successfully
    restart: unless-stopped

  realtime:
    image: maintops-stack-realtime
    build: *realtime-build
    environment:
      NODE_ENV: ${REALTIME_NODE_ENV:-development}
      PORT: "3000"
      LOG_LEVEL: ${REALTIME_LOG_LEVEL:-info}
      CORS_ORIGIN: ${REALTIME_CORS_ORIGIN:-http://localhost:5173}
      HTTP_MAX_PAYLOAD_BYTES: "65536"
      REDIS_URL: redis://redis:6379
      REDIS_CONNECT_TIMEOUT_MS: "1500"
      REDIS_MAX_RETRY_DELAY_MS: "5000"
      MAINTOPS_EVENTS_STREAM: ${MAINTOPS_EVENTS_STREAM:-maintops:events}
      MAINTOPS_EVENTS_CONSUMER_GROUP: ${MAINTOPS_EVENTS_CONSUMER_GROUP:-realtime-gateway}
      MAINTOPS_EVENTS_DEAD_LETTER_STREAM: ${MAINTOPS_EVENTS_DEAD_LETTER_STREAM:-maintops:events:dead-letter}
      REDIS_STREAM_BATCH_SIZE: "50"
      REDIS_STREAM_BLOCK_MS: "5000"
      REDIS_STREAM_CLAIM_IDLE_MS: "60000"
      REDIS_STREAM_RETRY_DELAY_MS: "1000"
      EVENT_DEDUP_TTL_SECONDS: "86400"
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:-maintops-local-development-service-token-secret}
      REALTIME_ALLOWED_ROLES: ${REALTIME_ALLOWED_ROLES:-super_admin,admin,workshop_manager,advisor,technician}
      REALTIME_MAX_CONNECTIONS: "1000"
      REALTIME_MAX_CONNECTIONS_PER_USER: "3"
      REALTIME_MAX_PAYLOAD_BYTES: "65536"
      PRESENCE_TTL_SECONDS: "60"
    ports:
      - "${REALTIME_PORT:-3000}:3000"
    depends_on:
      redis:
        condition: service_healthy
      laravel:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/ready').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20

  analytics-db:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:${ANALYTICS_POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${ANALYTICS_POSTGRES_DB:-maintops_analytics}
      POSTGRES_USER: ${ANALYTICS_POSTGRES_USER:-maintops_analytics}
      POSTGRES_PASSWORD: ${ANALYTICS_POSTGRES_PASSWORD:-maintops-analytics-password}
    volumes:
      - analytics-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  analytics-migrations:
    image: maintops-stack-analytics
    command: alembic upgrade head
    environment: *analytics-environment
    depends_on:
      analytics-db:
        condition: service_healthy
    restart: "no"

  analytics-initial-sync:
    image: maintops-stack-analytics
    command: python -m app.initial_sync
    environment: *analytics-environment
    depends_on:
      laravel:
        condition: service_healthy
      analytics-migrations:
        condition: service_completed_successfully
    restart: "no"

  analytics-api:
    image: maintops-stack-analytics
    build: *analytics-build
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *analytics-environment
      CORS_ORIGINS: ${ANALYTICS_CORS_ORIGINS:-["http://localhost:5173"]}
    ports:
      - "${ANALYTICS_API_PORT:-8001}:8000"
    depends_on:
      redis:
        condition: service_healthy
      analytics-db:
        condition: service_healthy
      analytics-initial-sync:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready')\""]
      interval: 5s
      timeout: 5s
      retries: 20

  analytics-worker:
    image: maintops-stack-analytics
    command: python -m app.worker
    environment: *analytics-environment
    depends_on:
      redis:
        condition: service_healthy
      analytics-db:
        condition: service_healthy
      analytics-initial-sync:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    image: maintops-stack-frontend
    build: *frontend-build
    environment:
      FRONTEND_ALLOWED_HOSTS: ${FRONTEND_ALLOWED_HOSTS:-localhost,127.0.0.1}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_REALTIME_URL: ${VITE_REALTIME_URL:-http://localhost:3000}
      VITE_ANALYTICS_BASE_URL: ${VITE_ANALYTICS_BASE_URL:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      laravel:
        condition: service_healthy
      realtime:
        condition: service_healthy
      analytics-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
  redis-data:
  analytics-postgres-data:
